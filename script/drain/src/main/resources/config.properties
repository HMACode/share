# Comma-separated list of queues to drain.
# - Direct mode (jndi.enabled=false): actual MQ queue names, e.g. DEV.QUEUE.1
# - JNDI mode  (jndi.enabled=true):  JNDI names of the queues, e.g. jms/myQueue
queues=DEV.QUEUE.1,DEV.QUEUE.2

# Seconds to wait between scans of the queue list.
pollIntervalSeconds=10

# Credentials — leave empty when the channel does not require authentication.
mq.user=
mq.password=

# --- Direct connection mode (jndi.enabled=false) ---
mq.host=localhost
mq.port=1414
mq.channel=DEV.APP.SVRCONN
mq.queueManager=QM1

# --- JNDI mode (jndi.enabled=true) ---
# Set jndi.enabled=true to look up the connection factory and queues by JNDI
# name instead of using the mq.* connection properties above.
jndi.enabled=false
# File-based JNDI (.bindings file created by JMSAdmin) example:
jndi.initialContextFactory=com.sun.jndi.fscontext.RefFSContextFactory
jndi.providerUrl=file:///C:/mq/jndi
jndi.connectionFactory=myConnectionFactory
